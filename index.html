<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Shipping Label</title>

<style>

/* PRINT SETTINGS */
@page {
  margin: 10mm;
}

@media print {
  body {
    margin: 0;
  }

  .container {
    width: 100%;
    height: 50vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  table {
    width: 95%;
    height: 100%;
  }
}

/* NORMAL VIEW */
body {
  font-family: Arial;
  margin: 0;
  padding: 10px;
}

.container {
  width: 100%;
  height: 50vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

table {
  width: 95%;
  border-collapse: collapse;
  table-layout: fixed;
}

/* EQUAL COLUMN WIDTH */
colgroup col {
  width: 25%;
}

td {
  border: 1px solid black;
  padding: 8px;
  font-size: 20px;
  vertical-align: middle;
  word-wrap: break-word;
}

.bold {
  font-weight: bold;
  font-size: 18px;
}

</style>
</head>

<body onload="loadData()">

<div class="container">

<table>

<colgroup>
  <col>
  <col>
  <col>
  <col>
</colgroup>

<!-- ROW 1 -->
<tr>
<td class="bold">CARTON NUMBER</td>
<td id="carton"></td>
<td class="bold">TOTAL CARTONS</td>
<td id="total_cartons"></td>
</tr>

<!-- ROW 2 -->
<tr>
<td class="bold">CUSTOMER & DELIVERY DETAILS</td>
<td colspan="3" id="customer"></td>
</tr>

<!-- ROW 3 -->
<tr>
<td class="bold">DELIVERY CITY</td>
<td id="city"></td>
<td class="bold">CONTACT DETAILS</td>
<td id="phone"></td>
</tr>

<!-- ROW 4 -->
<tr>
<td class="bold">SHIPPER ADDRESS</td>
<td colspan="3" id="shipper"></td>
</tr>

<!-- ROW 5 -->
<tr>
<td class="bold">SHIPPER CONTACT</td>
<td colspan="3" id="shipper_contact"></td>
</tr>

</table>

</div>

<script>
function loadData() {
  const params = new URLSearchParams(window.location.search);

  document.getElementById("carton").innerText = params.get("carton") || "1";
  document.getElementById("total_cartons").innerText = params.get("total_cartons") || "1";

  document.getElementById("customer").innerHTML = decodeURIComponent(params.get("customer") || "");

  document.getElementById("city").innerText = params.get("city") || "";
  document.getElementById("phone").innerText = params.get("phone") || "";

  document.getElementById("shipper").innerHTML = decodeURIComponent(params.get("shipper") || "");
  document.getElementById("shipper_contact").innerText = params.get("shipper_contact") || "";

  // Auto print
  setTimeout(() => {
    window.print();
  }, 500);
}
</script>

</body>
</html>
